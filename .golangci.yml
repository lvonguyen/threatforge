
version: "2"
run:
  modules-download-mode: readonly
linters:
  enable:
    - bodyclose
    - exhaustive
    - goconst
    - gocritic
    - gosec
    - misspell
    - nakedret
    - revive
    - unconvert
  settings:
    errcheck:
      check-type-assertions: false
      check-blank: false
      exclude-functions:
        - (io.Closer).Close
        - (net/http.ResponseWriter).Write
        - (*encoding/json.Encoder).Encode
        - (*database/sql.Tx).Rollback
        - (*go.uber.org/zap.Logger).Sync
    goconst:
      min-len: 5
      min-occurrences: 7
    gocritic:
      disabled-checks:
        - appendAssign
        - commentedOutCode
        - ifElseChain
        - elseif
        - sprintfQuotedString
        - builtinShadowDecl
        - exitAfterDefer
      enabled-tags:
        - diagnostic
    gosec:
      excludes:
        - G101
        - G104
        - G117
        - G204
        - G304
        - G306
        - G404
        - G704
        - G705
        - G706
    staticcheck:
      checks:
        - "all"
        - "-QF*"
        - "-SA9003"
        - "-ST1003"
        - "-ST1005"
        - "-S1039"
    govet:
      disable:
        - fieldalignment
        - shadow
        - unusedwrite
      enable-all: true
    nakedret:
      max-func-lines: 30
    revive:
      rules:
        - name: blank-imports
        - name: context-as-argument
        - name: context-keys-type
        - name: dot-imports
        - name: error-return
        - name: error-strings
        - name: error-naming
        - name: if-return
        - name: increment-decrement
        - name: var-declaration
        - name: package-comments
        - name: range
        - name: receiver-naming
        - name: time-naming
        - name: indent-error-flow
        - name: errorf
        - name: superfluous-else
        - name: unreachable-code
  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    rules:
      - linters:
          - errcheck
          - goconst
          - gosec
        path: _test\.go
      - linters:
          - all
        path: \.pb\.go
      - linters:
          - funlen
        path: cmd/
    paths:
      - third_party$
      - builtin$
      - examples$
issues:
  max-issues-per-linter: 50
  max-same-issues: 10
formatters:
  enable:
    - gofmt
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$
