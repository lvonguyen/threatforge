version: '3.8'

services:
  # ThreatForge API server
  api:
    build: .
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
      - REDIS_ADDR=redis:6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:-changeme}
      - THREATFORGE_API_KEY=${THREATFORGE_API_KEY:-}
      - CONFIG_PATH=/app/configs/config.yaml
      # Threat intel API keys — set via .env (all optional, disabled by default)
      - MISP_API_KEY=${MISP_API_KEY:-}
      - OTX_API_KEY=${OTX_API_KEY:-}
      - VIRUSTOTAL_API_KEY=${VIRUSTOTAL_API_KEY:-}
      - GREYNOISE_API_KEY=${GREYNOISE_API_KEY:-}
      - ABUSEIPDB_API_KEY=${ABUSEIPDB_API_KEY:-}
      # Splunk HEC tokens — set via .env
      - SPLUNK_HEC_TOKEN_INBOUND=${SPLUNK_HEC_TOKEN_INBOUND:-}
      - SPLUNK_HEC_TOKEN_OUTBOUND=${SPLUNK_HEC_TOKEN_OUTBOUND:-}
    depends_on:
      redis:
        condition: service_healthy
    read_only: true
    tmpfs:
      - /tmp:size=32m,mode=1777
    restart: unless-stopped
    volumes:
      - ./configs/config.yaml:/app/configs/config.yaml:ro
    networks:
      - frontend
      - backend
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: "0.50"

  # Redis — threat intel cache (internal only, no host port)
  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    command: >
      redis-server
      --appendonly yes
      --requirepass ${REDIS_PASSWORD:-changeme}
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "$$REDIS_PASSWORD", "--no-auth-warning", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - backend
    deploy:
      resources:
        limits:
          memory: 256m
          cpus: "0.25"

  # ---------------------------------------------------------------------------
  # OPTIONAL: Kafka + Zookeeper for full event streaming mode
  # Uncomment to enable high-throughput alert ingestion via Kafka topics.
  # Required env: KAFKA_BROKERS=kafka:9092
  # ---------------------------------------------------------------------------

  # zookeeper:
  #   image: confluentinc/cp-zookeeper:7.6.0
  #   environment:
  #     ZOOKEEPER_CLIENT_PORT: 2181
  #     ZOOKEEPER_TICK_TIME: 2000
  #   ports:
  #     - "2181:2181"
  #   restart: unless-stopped

  # kafka:
  #   image: confluentinc/cp-kafka:7.6.0
  #   depends_on:
  #     - zookeeper
  #   ports:
  #     - "9092:9092"
  #   environment:
  #     KAFKA_BROKER_ID: 1
  #     KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
  #     KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
  #     KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
  #     KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
  #     # Topics: threatforge.alerts.raw, threatforge.alerts.enriched
  #   restart: unless-stopped

networks:
  frontend:
  backend:
    internal: true

volumes:
  redis_data:
